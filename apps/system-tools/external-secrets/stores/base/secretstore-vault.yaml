apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: https://openbao.support4u.se/
      path: homelab
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-external-secrets
          serviceAccountRef:
            name: eso-vault
