apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc:8200"
      # OpenBao KV v2 mount name (adjust if your mount isn't called 'kv')
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-external-secrets
          serviceAccountRef:
            name: eso-vault
            namespace: external-secrets
