apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: velero

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - credentials-secret.yaml # base fallback; overridden by ExternalSecret in overlays if you enable OpenBao
  - backupstoragelocation.yaml
  - deployment.yaml

# Velero CRDs are managed by the separate app: apps/system-tools/velero-crds
