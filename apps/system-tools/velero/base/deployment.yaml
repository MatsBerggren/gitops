apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  namespace: velero
  labels:
    app.kubernetes.io/name: velero
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: velero
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velero
    spec:
      serviceAccountName: velero
      initContainers:
        # Copy AWS plugin into the shared /plugins dir.
        # This avoids running `velero plugin add` (which may require network access from the pod).
        - name: velero-plugin-for-aws
          image: velero/velero-plugin-for-aws:v1.13.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
          args:
            - -c
            - |
              set -e
              echo "Copying Velero AWS plugin into /plugins";
              # Most plugin images include the binary at /velero-plugin-for-aws
              cp -v /velero-plugin-for-aws /plugins/velero-plugin-for-aws
              chmod +x /plugins/velero-plugin-for-aws
          volumeMounts:
            - name: plugins
              mountPath: /plugins
      containers:
        - name: velero
          image: velero/velero:v1.13.2
          imagePullPolicy: IfNotPresent
          command:
            - /velero
          args:
            - server
          env:
            - name: VELERO_SCRATCH_DIR
              value: /scratch
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /credentials/cloud
          volumeMounts:
            - name: cloud-credentials
              mountPath: /credentials
            - name: scratch
              mountPath: /scratch
            - name: plugins
              mountPath: /plugins
      volumes:
        - name: cloud-credentials
          secret:
            secretName: cloud-credentials
        - name: scratch
          emptyDir: {}
        - name: plugins
          emptyDir: {}
