# Velero (homelab / Talos)
# - Object storage: MinIO (S3-compatible)
# - Credentials: provided by ExternalSecrets/OpenBAO in Secret "cloud-credentials"
# - Volume backups: node-agent (restic)

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero
      prefix: homelab
      default: true
      config:
        region: minio
        s3ForcePathStyle: "true"
        s3Url: https://minio.support4u.se

  # Start without CSI snapshots; node-agent (restic) covers PVC data.
  volumeSnapshotLocation: []

credentials:
  existingSecret: cloud-credentials

# AWS plugin init container (S3/MinIO)
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.11.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

# "Backup everything" incl PVCs: enable node-agent
deployNodeAgent: true

# Talos/PSS: make security contexts explicit
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Give Velero a writable scratch dir for kopia repository config/cache
# (kopia tries to create /udmrepo by default; pointing scratch dir to /scratch avoids permission issues)
extraEnvVars:
  - name: VELERO_SCRATCH_DIR
    value: /scratch
  - name: HOME
    value: /scratch
  - name: XDG_CACHE_HOME
    value: /scratch/.cache
extraVolumes:
  - name: scratch
    emptyDir: {}
  - name: udmrepo
    emptyDir: {}
  - name: cache
    emptyDir: {}
extraVolumeMounts:
  - name: scratch
    mountPath: /scratch
  - name: udmrepo
    mountPath: /udmrepo
  - name: cache
    mountPath: /.cache

# node-agent needs hostPath; keep it root but locked down
nodeAgent:
  podVolumePath: /var/lib/kubelet/pods
  podSecurityContext:
    runAsUser: 0
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  extraEnvVars:
    - name: HOME
      value: /scratch
    - name: XDG_CACHE_HOME
      value: /scratch/.cache

# CRDs are managed by separate app (apps/system-tools/velero-crds)
upgradeCRDs: false
upgradeCRDsJob:
  enabled: false
