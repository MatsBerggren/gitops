apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /bao/data/core && chown -R 1000:1000 /bao/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /bao/data
      containers:
        - name: openbao
          image: ghcr.io/openbao/openbao:2.1.0
          imagePullPolicy: IfNotPresent
          args:
            - server
            - -config=/bao/config/config.hcl
          ports:
            - name: http
              containerPort: 8200
          env:
            - name: BAO_ADDR
              value: http://127.0.0.1:8200
          # NOTE: /v1/sys/health returns 501 when not initialized and 503 when sealed.
          # During bootstrap we disable liveness (to avoid restart loops) and keep a lenient readiness.
          readinessProbe:
            tcpSocket:
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: config
              mountPath: /bao/config
            - name: data
              mountPath: /bao/data
      volumes:
        - name: config
          configMap:
            name: openbao-config
        - name: data
          persistentVolumeClaim:
            claimName: openbao-data
