apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      initContainers:
        - name: copyutil
          image: quay.io/argoproj/argocd:v3.3.2
          command: ["sh", "-c"]
          args:
            - >-
              /bin/cp --update=none /usr/local/bin/argocd /var/run/argocd/argocd &&
              /bin/ln -sf /var/run/argocd/argocd /var/run/argocd/argocd-cmp-server
